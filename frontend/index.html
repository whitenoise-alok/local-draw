<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Draw</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <span class="app-title">Local Draw</span>
    <div class="topbar-actions">
      <button id="import-svg-btn" class="btn-secondary">Import SVG</button>
      <button id="new-canvas-btn" class="btn-primary">+ New canvas</button>
    </div>
    <input id="import-svg-input" type="file" accept=".svg,image/svg+xml" hidden />
  </header>
  <main class="list-page">
    <ul id="canvas-list" class="canvas-list"></ul>
    <p id="empty-state" class="empty-state" hidden>No canvases yet — create one to get started.</p>
  </main>
  <script type="module" src="/src/ui/list.js"></script>
</body>
</html>
